<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/library/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/library/favicon.png" type="image/png">
<meta name="description" content="A reading engine for full books — chapter reader, contents, saved position, and theme controls. First title: ANACHRONIZM, a sci-fi trilogy by A. R. Azure.">
<title>The Reading Room</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
<style>
  :root{
    --serif:"Newsreader",Georgia,serif; --display:"Fraunces",Georgia,serif; --mono:"DM Mono",ui-monospace,monospace;
    --fs:1.18rem; --lh:1.75; --maxw:38rem;
  }
  [data-theme="light"]{--bg:#faf7f0;--fg:#221e18;--dim:#7a7266;--line:rgba(34,30,24,.13);--accent:#b4530f;--bar:#e9e2d4}
  [data-theme="sepia"]{--bg:#f3e9d5;--fg:#3a3226;--dim:#8a7c62;--line:rgba(58,50,38,.16);--accent:#a2560f;--bar:#e2d5ba}
  [data-theme="dark"]{--bg:#16130f;--fg:#e6ddcd;--dim:#8f8574;--line:rgba(230,221,205,.14);--accent:#e0a24a;--bar:#241f18}
  *{box-sizing:border-box;margin:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--fg);font-family:var(--serif);transition:background .3s,color .3s}

  /* top bar */
  .top{position:sticky;top:0;z-index:40;display:flex;align-items:center;gap:.5rem;height:52px;padding:0 clamp(.7rem,3vw,1.2rem);
    background:color-mix(in srgb,var(--bg) 88%,transparent);backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
  .top a.back,.top button{font-family:var(--mono);font-size:12px;color:var(--fg);background:none;border:1px solid var(--line);
    border-radius:7px;padding:6px 10px;cursor:pointer;text-decoration:none;transition:border-color .15s,color .15s;white-space:nowrap}
  .top a.back:hover,.top button:hover{border-color:var(--accent);color:var(--accent)}
  .top .booktitle{flex:1;text-align:center;font-family:var(--display);font-size:14px;font-weight:600;letter-spacing:.02em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .top .grp{display:flex;gap:.35rem}
  .top .icon{font-size:13px;min-width:34px;text-align:center}
  .progress{height:3px;background:var(--bar)}
  .progress-fill{height:100%;background:var(--accent);width:0;transition:width .25s}

  /* reading area */
  .reader{max-width:var(--maxw);margin:0 auto;padding:clamp(1.6rem,6vw,3.6rem) clamp(1.1rem,5vw,1.6rem) 5rem}
  .ch-eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
  .ch-title{font-family:var(--display);font-weight:600;font-size:clamp(1.7rem,6vw,2.5rem);line-height:1.08;letter-spacing:-.01em;margin-bottom:2rem}
  .ch-body{font-size:var(--fs);line-height:var(--lh)}
  .ch-body p{margin:0 0 1.25em}
  .ch-body em{font-style:italic}
  .ch-body strong{font-weight:600}
  .ch-body h1,.ch-body h2,.ch-body h3,.ch-body h4{font-family:var(--display);font-weight:600;line-height:1.15;margin:1.6em 0 .6em}
  .ch-body h1{font-size:1.6em}.ch-body h2{font-size:1.3em}.ch-body h3{font-size:1.12em}.ch-body h4{font-size:1em;color:var(--dim)}
  .ch-body blockquote{border-left:2px solid var(--accent);margin:1.4em 0;padding:.2em 0 .2em 1.2em;color:var(--dim);font-style:italic}
  .ch-body hr{border:none;border-top:1px solid var(--line);margin:2.2em auto;width:40%}
  .ch-body a{color:var(--accent)}

  /* prev/next */
  .chnav{max-width:var(--maxw);margin:0 auto;padding:0 clamp(1.1rem,5vw,1.6rem) 4rem;display:flex;justify-content:space-between;gap:1rem}
  .chnav button{flex:1;max-width:48%;text-align:left;font-family:var(--serif);background:none;border:1px solid var(--line);border-radius:10px;
    padding:.9rem 1rem;color:var(--fg);cursor:pointer;transition:border-color .15s;min-height:64px}
  .chnav button:hover:not(:disabled){border-color:var(--accent)}
  .chnav button:disabled{opacity:.3;cursor:default}
  .chnav button.next{text-align:right}
  .chnav .cn-label{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);display:block;margin-bottom:3px}
  .chnav .cn-title{font-size:14px;font-weight:500}

  /* TOC drawer */
  .toc-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
  .toc-overlay.open{opacity:1;pointer-events:auto}
  .toc{position:fixed;top:0;left:0;bottom:0;width:min(340px,86vw);background:var(--bg);border-right:1px solid var(--line);z-index:51;
    transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:1.2rem 0}
  .toc.open{transform:translateX(0)}
  .toc-head{font-family:var(--display);font-weight:600;font-size:1.2rem;padding:.4rem 1.3rem 1rem;border-bottom:1px solid var(--line);margin-bottom:.6rem}
  .toc-book{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);padding:1rem 1.3rem .3rem}
  .toc-part{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);padding:.5rem 1.3rem .2rem}
  .toc-ch{display:block;width:100%;text-align:left;background:none;border:none;color:var(--fg);font-family:var(--serif);font-size:14px;
    padding:.5rem 1.3rem;cursor:pointer;border-left:2px solid transparent}
  .toc-ch:hover{background:color-mix(in srgb,var(--fg) 6%,transparent)}
  .toc-ch.current{border-left-color:var(--accent);color:var(--accent);font-weight:500}

  .loading{max-width:var(--maxw);margin:0 auto;padding:5rem 1.5rem;text-align:center;color:var(--dim);font-family:var(--mono);font-size:13px}
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}*{transition:none!important}}
</style>
</head>
<body>
<div class="top">
  <a class="back" href="/library/lab/">&larr;</a>
  <button id="tocBtn" title="Contents">&#9776; Contents</button>
  <div class="booktitle" id="topTitle">The Reading Room</div>
  <div class="grp">
    <button class="icon" id="fontDown" title="Smaller">A&minus;</button>
    <button class="icon" id="fontUp" title="Larger">A+</button>
    <button class="icon" id="themeBtn" title="Theme">&#9789;</button>
  </div>
</div>
<div class="progress"><div class="progress-fill" id="progressFill"></div></div>

<div class="toc-overlay" id="tocOverlay"></div>
<nav class="toc" id="toc"></nav>

<main>
  <div class="loading" id="loading">Opening the book&hellip;</div>
  <article class="reader" id="reader" style="display:none">
    <div class="ch-eyebrow" id="chEyebrow"></div>
    <h1 class="ch-title" id="chTitle"></h1>
    <div class="ch-body" id="chBody"></div>
  </article>
  <div class="chnav" id="chnav" style="display:none">
    <button class="prev" id="prevBtn"><span class="cn-label">&larr; Previous</span><span class="cn-title" id="prevTitle"></span></button>
    <button class="next" id="nextBtn"><span class="cn-label">Next &rarr;</span><span class="cn-title" id="nextTitle"></span></button>
  </div>
</main>

<script>
// ── Reading engine ── book-agnostic. Add a title by dropping its .md and an entry here.
const BOOKS = {
  anachronizm: { title: "ANACHRONIZM", author: "A. R. Azure", file: "/library/read/anachronizm.md" },
};

const PREF_KEY = "reading-room:prefs";
const THEMES = ["light","sepia","dark"];
const SIZES = [1.02,1.1,1.18,1.28,1.4];

let prefs = loadPrefs();
let chapters = [];
let bookId = "anachronizm";
let idx = 0;

function loadPrefs(){ try{ return JSON.parse(localStorage.getItem(PREF_KEY)) || {}; }catch(e){ return {}; } }
function savePrefs(){ try{ localStorage.setItem(PREF_KEY, JSON.stringify(prefs)); }catch(e){} }
function posKey(){ return "reading-room:pos:" + bookId; }

// apply theme + font size
function applyPrefs(){
  document.documentElement.dataset.theme = prefs.theme || "sepia";
  document.documentElement.style.setProperty("--fs", (prefs.fs || SIZES[2]) + "rem");
}

function clean(s){ return s.replace(/\*/g,"").replace(/\s+/g," ").trim(); }

function parseBook(md){
  const lines = md.split("\n");
  const out = [];
  let cur = null, book = "", part = "";
  const push = () => { if (cur) out.push(cur); };
  for (const raw of lines){
    if (/^\\newpage/.test(raw.trim())) continue;
    let m;
    if ((m = raw.match(/^###\s+Book\s+(.+)/))){ push(); book = clean(m[1]); part = ""; cur = { book, part:"", title: "Book " + clean(m[1]), body: [], intro:true }; continue; }
    if ((m = raw.match(/^#\s+PART\s+(.+)/))){ part = clean(m[1]); continue; }
    if ((m = raw.match(/^##\s+Chapter\s+(.+)/))){ push(); cur = { book, part, title: "Chapter " + clean(m[1]), body: [] }; continue; }
    if (!cur) cur = { book:"", part:"", title:"Title Page", body:[], intro:true };
    cur.body.push(raw);
  }
  push();
  return out;
}

function render(){
  const ch = chapters[idx];
  document.getElementById("chEyebrow").textContent = [ch.book, ch.part].filter(Boolean).join("  ·  ");
  document.getElementById("chTitle").textContent = ch.title;
  document.getElementById("chBody").innerHTML = marked.parse(ch.body.join("\n").trim());
  const prev = chapters[idx-1], next = chapters[idx+1];
  const pb = document.getElementById("prevBtn"), nb = document.getElementById("nextBtn");
  pb.disabled = !prev; nb.disabled = !next;
  document.getElementById("prevTitle").textContent = prev ? prev.title : "";
  document.getElementById("nextTitle").textContent = next ? next.title : "";
  document.getElementById("progressFill").style.width = ((idx+1)/chapters.length*100) + "%";
  // TOC current highlight
  document.querySelectorAll(".toc-ch").forEach((b,i)=> b.classList.toggle("current", i===idx));
  window.scrollTo(0,0);
  try{ localStorage.setItem(posKey(), String(idx)); }catch(e){}
  const active = document.querySelector(".toc-ch.current");
  if (active) active.scrollIntoView({block:"nearest"});
}

function go(i){ idx = Math.max(0, Math.min(chapters.length-1, i)); render(); }

function buildTOC(){
  const toc = document.getElementById("toc");
  let html = '<div class="toc-head">Contents</div>';
  let lastBook = null, lastPart = null;
  chapters.forEach((ch, i) => {
    if (ch.book !== lastBook){ html += '<div class="toc-book">' + (ch.book || "&nbsp;") + '</div>'; lastBook = ch.book; lastPart = null; }
    if (ch.part && ch.part !== lastPart){ html += '<div class="toc-part">' + ch.part + '</div>'; lastPart = ch.part; }
    html += '<button class="toc-ch" data-i="' + i + '">' + ch.title + '</button>';
  });
  toc.innerHTML = html;
  toc.querySelectorAll(".toc-ch").forEach(b => b.addEventListener("click", () => { go(+b.dataset.i); closeTOC(); }));
}

function openTOC(){ document.getElementById("toc").classList.add("open"); document.getElementById("tocOverlay").classList.add("open"); const a=document.querySelector(".toc-ch.current"); if(a) a.scrollIntoView({block:"center"}); }
function closeTOC(){ document.getElementById("toc").classList.remove("open"); document.getElementById("tocOverlay").classList.remove("open"); }

async function boot(){
  applyPrefs();
  const params = new URLSearchParams(location.search);
  if (params.get("book") && BOOKS[params.get("book")]) bookId = params.get("book");
  const meta = BOOKS[bookId];
  document.getElementById("topTitle").textContent = meta.title;
  document.title = meta.title + " — The Reading Room";
  try{
    const md = await fetch(meta.file, { cache: "no-cache" }).then(r => { if(!r.ok) throw new Error(r.status); return r.text(); });
    chapters = parseBook(md);
    if (!chapters.length) throw new Error("no chapters parsed");
  }catch(e){
    document.getElementById("loading").textContent = "Couldn't open the book. " + e.message;
    return;
  }
  buildTOC();
  const saved = parseInt(localStorage.getItem(posKey()) || "0", 10);
  idx = isNaN(saved) ? 0 : Math.max(0, Math.min(chapters.length-1, saved));
  document.getElementById("loading").style.display = "none";
  document.getElementById("reader").style.display = "block";
  document.getElementById("chnav").style.display = "flex";
  render();
}

// controls
document.getElementById("prevBtn").addEventListener("click", () => go(idx-1));
document.getElementById("nextBtn").addEventListener("click", () => go(idx+1));
document.getElementById("tocBtn").addEventListener("click", openTOC);
document.getElementById("tocOverlay").addEventListener("click", closeTOC);
document.getElementById("themeBtn").addEventListener("click", () => {
  const cur = THEMES.indexOf(prefs.theme || "sepia");
  prefs.theme = THEMES[(cur+1)%THEMES.length]; savePrefs(); applyPrefs();
});
document.getElementById("fontUp").addEventListener("click", () => { const i = Math.min(SIZES.length-1, SIZES.indexOf(prefs.fs||SIZES[2])+1); prefs.fs = SIZES[i<0?2:i]; savePrefs(); applyPrefs(); });
document.getElementById("fontDown").addEventListener("click", () => { const i = Math.max(0, SIZES.indexOf(prefs.fs||SIZES[2])-1); prefs.fs = SIZES[i<0?2:i]; savePrefs(); applyPrefs(); });
document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") go(idx+1);
  else if (e.key === "ArrowLeft") go(idx-1);
  else if (e.key === "Escape") closeTOC();
});
boot();
</script>
</body>
</html>
