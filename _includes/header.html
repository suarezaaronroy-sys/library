<div class="topbar-wrap">
  <div class="topbar shell">
    <a href="{{ '/' | relative_url }}" class="brand" aria-label="{{ site.title }} — Home">
      <div class="brand-icon"><img src="{{ '/favicon.png' | relative_url }}" alt="AS" onerror="this.style.display='none';this.nextElementSibling.style.display='grid'"><span class="brand-icon-fallback" style="display:none">AS</span></div>
      <div class="brand-copy"><strong>{{ site.title }}</strong><span>{{ site.author.location }}</span></div>
    </a>
    <nav class="nav" aria-label="Main navigation">
      <a href="{{ '/about/' | relative_url }}"{% if page.url == '/about/' %} class="nav-active"{% endif %}>About</a>
      <a href="{{ '/projects/' | relative_url }}"{% if page.url == '/projects/' %} class="nav-active"{% endif %}>Library</a>
      <a href="{{ '/notes/' | relative_url }}"{% if page.url contains '/notes' %} class="nav-active"{% endif %}>Notes</a>
      <a href="{{ '/workbench/' | relative_url }}"{% if page.url contains '/workbench' %} class="nav-active"{% endif %}>Workbench</a>
      <a href="{{ '/lab/' | relative_url }}"{% if page.url contains '/lab' %} class="nav-active"{% endif %}>Projects</a>
      <button class="nav-search" type="button" data-open-site-search aria-label="Search the site"><span>Search</span><kbd>/</kbd></button>
      <a href="{{ '/contact/' | relative_url }}"{% if page.url == '/contact/' %} class="nav-cta nav-active"{% else %} class="nav-cta"{% endif %}>Contacts</a>
    </nav>
  </div>
</div>
